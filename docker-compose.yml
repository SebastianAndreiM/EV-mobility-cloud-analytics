services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_pass
      POSTGRES_DB: ev_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://ev_user:ev_pass@db:5432/ev_analytics
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CACHE_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CORS_ORIGINS: http://localhost:5173
      JWT_SECRET: please-change-this-secret
    ports:
      - "8000:8000"
    volumes:
      - model_artifacts:/app/app/artifacts/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://ev_user:ev_pass@db:5432/ev_analytics
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: please-change-this-secret
    volumes:
      - model_artifacts:/app/app/artifacts/models
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  model_artifacts:
